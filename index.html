<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Splitter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F7F2;
    --surface: #FFFFFF;
    --surface2: #E8F2E8;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.12);
    --text: #141A14;
    --text2: #4F6B52;
    --text3: #89A88C;
    --accent: #2A7A3B;
    --accent-light: #DFF2E3;
    --radius: 16px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(42,122,59,0.08);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);

    --p0: #EDE8FB; --p1: #7C72D9; --p2: #3D358A;
    --t0: #E0F5EE; --t1: #1D9E75; --t2: #085041;
    --o0: #FBE9E0; --o1: #D4521A; --o2: #712B13;
    --b0: #E4EFFA; --b1: #2E7DC5; --b2: #0C3D6E;
    --pk0: #FBE7EF; --pk1: #C94070; --pk2: #6B1E3A;
    --g0: #F0EDE7; --g1: #7A786F; --g2: #2C2C2A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
  .upload-zone p { color: var(--text2); font-size: 13px; }

  /* Image preview */
  .img-preview-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .img-preview {
    width: 90px; height: 120px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  .img-info { flex: 1; }
  .img-info h4 { font-weight: 500; margin-bottom: 4px; }
  .img-info p { color: var(--text2); font-size: 13px; }
  .btn-scan {
    margin-top: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-scan:hover { opacity: 0.88; }
  .btn-scan:active { transform: scale(0.97); }
  .btn-scan:disabled { opacity: 0.5; cursor: default; }

  /* Loading */
  .scanning-wrap {
    text-align: center;
    padding: 48px 32px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* People bar */
  .people-bar {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .people-bar-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
    white-space: nowrap;
  }
  .person-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px 5px 6px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    user-select: none;
    position: relative;
  }
  .person-chip .dot {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: #fff;
    flex-shrink: 0;
  }
  .person-chip .chip-remove {
    display: none;
    position: absolute; right: -4px; top: -4px;
    width: 14px; height: 14px;
    background: var(--text2);
    border-radius: 50%;
    color: #fff;
    font-size: 9px;
    align-items: center; justify-content: center;
    cursor: pointer;
    line-height: 1;
  }
  .person-chip:hover .chip-remove { display: flex; }
  .add-person-btn {
    padding: 5px 10px;
    border-radius: 100px;
    border: 1.5px dashed var(--border2);
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .add-person-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Receipt section */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 20px 0 8px;
    padding: 0 4px;
  }

  .items-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  .item-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.12s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface2); }

  .item-meta { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-qty {
    font-size: 12px;
    color: var(--text3);
  }
  .item-price {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text2);
    white-space: nowrap;
    margin-right: 12px;
  }
  .item-assignees {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
    max-width: 160px;
    justify-content: flex-end;
  }
  .assignee-dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: #fff;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    border: 2px solid var(--surface);
    flex-shrink: 0;
  }
  .assignee-dot:hover { transform: scale(1.15); }
  .assignee-dot.unassigned { opacity: 0.25; }
  .assignee-dot.unassigned:hover { opacity: 0.7; }

  /* Totals row */
  .totals-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-top: 8px;
  }
  .totals-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text2);
  }
  .totals-row:last-child { border-bottom: none; }
  .totals-row.grand {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    padding: 14px 16px;
  }
  .totals-row span:last-child { font-family: 'DM Mono', monospace; }

  /* Split summary */
  .split-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-top: 8px;
  }
  .split-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    border-top: 3px solid transparent;
  }
  .split-card-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .split-item {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    padding: 3px 0;
  }
  .split-item span:last-child { font-family: 'DM Mono', monospace; }
  .split-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .split-sub {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text3); padding: 2px 0;
  }
  .split-sub span:last-child { font-family: 'DM Mono', monospace; }
  .split-total {
    display: flex; justify-content: space-between;
    font-size: 16px; font-weight: 600;
    padding: 6px 0 0;
    margin-top: 4px;
    border-top: 1.5px solid var(--border2);
  }
  .split-total span:last-child { font-family: 'DM Mono', monospace; }

  .unassigned-warn {
    background: #FFFBE6;
    border: 1px solid #D4B800;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: #6B5200;
    margin-top: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Add person modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%; max-width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .modal-input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    color: var(--text);
    background: var(--bg);
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
  .btn-ghost {
    padding: 8px 16px;
    border: none; background: transparent;
    font-family: inherit; font-size: 14px;
    color: var(--text2); cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-primary {
    padding: 8px 18px;
    border: none;
    background: var(--accent); color: #fff;
    font-family: inherit; font-size: 14px; font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }

  /* Error */
  .error-box {
    background: #FEF0F0; border: 1px solid #F5B5B5;
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 13px; color: #8B1A1A; margin-bottom: 12px;
  }

  /* Multi-image preview */
  .preview-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 10px;
    box-shadow: var(--shadow-sm);
    display: flex;
    gap: 10px;
    align-items: flex-start;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
    position: relative;
  }
  .preview-card .img-preview {
    width: 56px; height: 72px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  .preview-remove {
    position: absolute; top: 6px; right: 6px;
    background: var(--surface2); border: none;
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 10px; cursor: pointer;
    color: var(--text2); line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .preview-remove:hover { background: #F5B5B5; color: #8B1A1A; }
  .add-more-card {
    background: var(--surface);
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    min-width: 120px;
    min-height: 100px;
    transition: all 0.15s;
    color: var(--text2);
  }
  .add-more-card:hover { border-color: var(--accent); color: var(--accent); }

  /* Reset link */
  .reset-btn {
    background: none; border: none; font-family: inherit;
    font-size: 13px; color: var(--text3); cursor: pointer;
    text-decoration: underline; padding: 0;
  }
  .reset-btn:hover { color: var(--text2); }

  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 480px) {
    .app { padding: 16px 12px 60px; }
    .split-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <div class="logo">
      <div class="logo-icon">🧾</div>
      Bill Splitter
    </div>
    <button class="reset-btn" id="resetBtn" onclick="resetApp()">Start over</button>
  </div>

  <!-- Step 1: Upload -->
  <div id="stepUpload">
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
      <div class="upload-icon">📷</div>
      <h3>Upload your receipts</h3>
      <p>Drag & drop or tap to select one or more images<br>Supports JPG, PNG, HEIC</p>
    </div>
  </div>

  <!-- Step 2: Preview & Scan -->
  <div id="stepPreview" class="hidden">
    <div id="previewGrid" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;"></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn-scan" id="scanAllBtn" onclick="scanAll()">
        ✨ Scan Receipts
      </button>
      <button class="btn-scan hidden" id="proceedBtn"
        style="background:var(--text2);"
        onclick="proceedToAssign()">
        Assign items →
      </button>
    </div>
  </div>

  <!-- Step 4: Assign -->
  <div id="stepAssign" class="hidden">
    <div class="people-bar">
      <span class="people-bar-label">Who's splitting?</span>
      <div id="peopleChips"></div>
      <button class="add-person-btn" onclick="showAddPerson()">+ Add person</button>
    </div>

    <div class="section-label">Items — tap dots to assign</div>
    <div class="items-card" id="itemsList"></div>

    <div class="section-label">Charges</div>
    <div class="totals-card" id="totalsList"></div>

    <div id="unassignedWarn" class="unassigned-warn hidden">
      ⚠️ <span id="unassignedWarnText"></span>
    </div>

    <div class="section-label">Split Summary</div>
    <div class="split-grid" id="splitSummary"></div>
  </div>

</div>

<!-- Add Person Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)hideModal()">
  <div class="modal">
    <h3>Add person</h3>
    <input class="modal-input" id="personNameInput" type="text" placeholder="Name" maxlength="20"
      onkeydown="if(event.key==='Enter')addPerson()">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn-primary" onclick="addPerson()">Add</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
const COLORS = [
  { bg: '#7C72D9', light: '#EDE8FB', text: '#3D358A' }, // purple
  { bg: '#1D9E75', light: '#E0F5EE', text: '#085041' }, // teal
  { bg: '#D4521A', light: '#FBE9E0', text: '#712B13' }, // orange
  { bg: '#2E7DC5', light: '#E4EFFA', text: '#0C3D6E' }, // blue
  { bg: '#C94070', light: '#FBE7EF', text: '#6B1E3A' }, // pink
  { bg: '#7A786F', light: '#F0EDE7', text: '#2C2C2A' }, // gray
];

let state = {
  images: [],      // [{ id, base64, fileName, previewSrc, status: 'pending'|'scanning'|'done'|'error', receipt }]
  receipt: null,   // merged receipt
  people: [],
  assignments: {}
};

// ─── Config ───────────────────────────────────────────────
const PROXY_URL = 'https://bill-splitter.ardienjeremy.workers.dev/';
// ─────────────────────────────────────────────────────────

// ─── File Handling ────────────────────────────────────────
function processFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const jpeg = canvas.toDataURL('image/jpeg', 0.72);
        resolve({
          id: 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2),
          base64: jpeg.split(',')[1],
          fileName: file.name,
          previewSrc: jpeg,
          status: 'pending',
          receipt: null
        });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleFiles(files) {
  const processed = await Promise.all(Array.from(files).map(processFile));
  state.images.push(...processed);
  hide('stepUpload');
  show('stepPreview');
  renderPreviews();
}

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

function renderPreviews() {
  const container = document.getElementById('previewGrid');
  const allDone = state.images.length > 0 && state.images.every(i => i.status === 'done');
  const anyScanning = state.images.some(i => i.status === 'scanning');
  const hasPending = state.images.some(i => i.status === 'pending');

  container.innerHTML = state.images.map(img => `
    <div class="preview-card" id="card_${img.id}">
      <img src="${img.previewSrc}" class="img-preview" alt="Receipt">
      <div class="img-info">
        <div style="font-size:13px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${img.fileName}</div>
        <div class="preview-status" id="status_${img.id}">
          ${statusBadge(img.status)}
        </div>
      </div>
      <button class="preview-remove" onclick="removeImage('${img.id}')" title="Remove">✕</button>
    </div>
  `).join('');

  // Add more button
  container.innerHTML += `
    <label class="add-more-card">
      <input type="file" accept="image/*" multiple onchange="handleFiles(this.files)" style="display:none">
      <div style="font-size:24px;margin-bottom:6px">＋</div>
      <div style="font-size:13px;color:var(--text2)">Add receipt</div>
    </label>
  `;

  const scanBtn = document.getElementById('scanAllBtn');
  scanBtn.disabled = anyScanning || !hasPending && !allDone;
  scanBtn.textContent = allDone ? '✓ All scanned' : anyScanning ? 'Scanning...' : `✨ Scan ${state.images.filter(i=>i.status==='pending').length} Receipt${state.images.filter(i=>i.status==='pending').length!==1?'s':''}`;

  const proceedBtn = document.getElementById('proceedBtn');
  if (allDone) proceedBtn.classList.remove('hidden');
  else proceedBtn.classList.add('hidden');
}

function statusBadge(status) {
  if (status === 'pending') return `<span style="font-size:12px;color:var(--text3)">Pending</span>`;
  if (status === 'scanning') return `<span style="font-size:12px;color:var(--accent)">Scanning...</span>`;
  if (status === 'done') return `<span style="font-size:12px;color:#1D9E75;font-weight:500">✓ Done</span>`;
  if (status === 'error') return `<span style="font-size:12px;color:#C94070">Failed — tap to retry</span>`;
}

function removeImage(id) {
  state.images = state.images.filter(i => i.id !== id);
  if (state.images.length === 0) {
    hide('stepPreview');
    show('stepUpload');
  } else {
    renderPreviews();
  }
}

// ─── Scan ─────────────────────────────────────────────────
async function scanImage(img, endpoint) {
  const prompt = `Look at this receipt image carefully. Extract all line items and financial totals.
Return ONLY a valid JSON object with this exact structure (no markdown, no explanation):
{
  "restaurant": "Restaurant name from receipt",
  "items": [
    {"id": 1, "name": "Item name", "qty": 1, "unit_price": 10000, "total": 10000}
  ],
  "subtotal": 0,
  "service_charge_pct": 0,
  "service_charge_amt": 0,
  "tax_label": "Tax label if any e.g. PB1, VAT, GST",
  "tax_pct": 0,
  "tax_amt": 0,
  "grand_total": 0
}
Rules:
- All monetary values as plain integers (no commas, no currency symbols)
- If qty > 1 and unit price is shown, use those; otherwise set qty=1 and unit_price=total
- If no service charge, set service_charge_pct and service_charge_amt to 0
- If no tax, set tax_pct and tax_amt to 0
- Return ONLY the JSON object`;

  const response = await fetch(endpoint, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      imageBase64: img.base64,
      prompt,
    })
  });

  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}));
    console.error('Provider error:', JSON.stringify(errBody));
    const msg = errBody?.error?.message || `HTTP ${response.status}`;
    throw new Error(msg);
  }

  const data = await response.json();
  console.log('Raw response:', JSON.stringify(data).slice(0, 500));
  const text = data.result || '';
  if (!text) throw new Error(data.error?.message || 'Empty response from model');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function scanAll() {
  const endpoint = PROXY_URL;
  if (!endpoint) {
    alert('Please set your PROXY_URL constant.');
    return;
  }

  const pending = state.images.filter(i => i.status === 'pending');
  for (const img of pending) {
    img.status = 'scanning';
    renderPreviews();
    try {
      const receipt = await scanImage(img, endpoint);
      img.receipt = receipt;
      img.status = 'done';
    } catch (err) {
      console.error('Scan error for', img.fileName, err);
      img.status = 'error';
    }
    renderPreviews();
  }
}

function mergeReceipts() {
  const receipts = state.images.filter(i => i.status === 'done').map(i => i.receipt);
  if (receipts.length === 0) return null;

  // Merge all items with globally unique IDs
  let itemId = 1;
  const allItems = [];
  receipts.forEach(r => {
    r.items.forEach(item => {
      allItems.push({ ...item, id: itemId++ });
    });
  });

  return {
    restaurant: receipts.map(r => r.restaurant).filter(Boolean).join(' + '),
    items: allItems,
    subtotal: receipts.reduce((s, r) => s + (r.subtotal || 0), 0),
    service_charge_pct: null,
    service_charge_amt: receipts.reduce((s, r) => s + (r.service_charge_amt || 0), 0),
    tax_label: receipts.find(r => r.tax_label)?.tax_label || 'Tax',
    tax_pct: null,
    tax_amt: receipts.reduce((s, r) => s + (r.tax_amt || 0), 0),
    grand_total: receipts.reduce((s, r) => s + (r.grand_total || 0), 0),
  };
}

function proceedToAssign() {
  const merged = mergeReceipts();
  if (!merged) return;
  state.receipt = merged;
  state.people = [{ id: 'p1', name: 'You', color: COLORS[0] }];
  state.assignments = {};
  merged.items.forEach(item => { state.assignments[item.id] = ['p1']; });
  hide('stepPreview');
  show('stepAssign');
  renderAssign();
}

// ─── People ───────────────────────────────────────────────
function renderPeople() {
  const chips = document.getElementById('peopleChips');
  chips.innerHTML = state.people.map(p => `
    <div class="person-chip" style="background:${p.color.light};color:${p.color.text}">
      <div class="dot" style="background:${p.color.bg}">${initials(p.name)}</div>
      ${p.name}
      <div class="chip-remove" onclick="removePerson('${p.id}')">✕</div>
    </div>
  `).join('');
}

function showAddPerson() {
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('personNameInput').focus(), 50);
  document.getElementById('personNameInput').value = '';
}
function hideModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}
function addPerson() {
  const name = document.getElementById('personNameInput').value.trim();
  if (!name) return;
  const id = 'p' + Date.now();
  const color = COLORS[state.people.length % COLORS.length];
  state.people.push({ id, name, color });
  hideModal();
  renderAssign();
}
function removePerson(id) {
  if (state.people.length <= 1) return;
  state.people = state.people.filter(p => p.id !== id);
  Object.keys(state.assignments).forEach(itemId => {
    state.assignments[itemId] = state.assignments[itemId].filter(pid => pid !== id);
  });
  renderAssign();
}
function initials(name) {
  return name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

// ─── Toggle assignment ────────────────────────────────────
function toggleAssign(itemId, personId) {
  const list = state.assignments[itemId] || [];
  const idx = list.indexOf(personId);
  if (idx === -1) list.push(personId); else list.splice(idx, 1);
  state.assignments[itemId] = list;
  renderAssign();
}

// ─── Render ───────────────────────────────────────────────
function renderAssign() {
  renderPeople();
  renderItems();
  renderTotals();
  renderSummary();
}

function renderItems() {
  const r = state.receipt;
  const el = document.getElementById('itemsList');
  el.innerHTML = r.items.map(item => {
    const assigned = state.assignments[item.id] || [];
    const dotsHtml = state.people.map(p => {
      const on = assigned.includes(p.id);
      return `<div class="assignee-dot ${on ? '' : 'unassigned'}"
        style="background:${on ? p.color.bg : '#ccc'};border-color:${on ? p.color.light : '#fff'}"
        onclick="toggleAssign(${item.id},'${p.id}')"
        title="${p.name}">${initials(p.name)}</div>`;
    }).join('');
    return `
      <div class="item-row">
        <div class="item-meta">
          <div class="item-name">${item.name}</div>
          ${item.qty > 1 ? `<div class="item-qty">×${item.qty} @ ${fmt(item.unit_price)}</div>` : ''}
        </div>
        <div class="item-price">${fmt(item.total)}</div>
        <div class="item-assignees">${dotsHtml}</div>
      </div>`;
  }).join('');
}

function renderTotals() {
  const r = state.receipt;
  const el = document.getElementById('totalsList');
  let rows = `<div class="totals-row"><span>Subtotal</span><span>${fmt(r.subtotal)}</span></div>`;
  if (r.service_charge_amt > 0)
    rows += `<div class="totals-row"><span>Service charge${r.service_charge_pct ? ' ' + r.service_charge_pct + '%' : ''}</span><span>${fmt(r.service_charge_amt)}</span></div>`;
  if (r.tax_amt > 0)
    rows += `<div class="totals-row"><span>${r.tax_label || 'Tax'}${r.tax_pct ? ' ' + r.tax_pct + '%' : ''}</span><span>${fmt(r.tax_amt)}</span></div>`;
  rows += `<div class="totals-row grand"><span>Grand Total</span><span>${fmt(r.grand_total)}</span></div>`;
  el.innerHTML = rows;
}

function renderSummary() {
  const r = state.receipt;
  const grid = document.getElementById('splitSummary');
  const warn = document.getElementById('unassignedWarn');

  // Calculate each person's share
  const shares = {}; // personId -> { items: [{name, share}], subtotal }
  state.people.forEach(p => { shares[p.id] = { items: [], subtotal: 0 }; });

  let unassignedCount = 0;

  r.items.forEach(item => {
    const assigned = (state.assignments[item.id] || []).filter(pid =>
      state.people.some(p => p.id === pid)
    );
    if (assigned.length === 0) { unassignedCount++; return; }
    const share = Math.round(item.total / assigned.length);
    assigned.forEach(pid => {
      shares[pid].items.push({ name: item.name, share });
      shares[pid].subtotal += share;
    });
  });

  // Distribute service charge & tax proportionally
  const totalItems = r.subtotal || 1;
  const extras = (r.service_charge_amt || 0) + (r.tax_amt || 0);

  state.people.forEach(p => {
    const ratio = shares[p.id].subtotal / totalItems;
    shares[p.id].extraShare = Math.round(extras * ratio);
    shares[p.id].total = shares[p.id].subtotal + shares[p.id].extraShare;
  });

  // Warn if unassigned
  if (unassignedCount > 0) {
    warn.classList.remove('hidden');
    document.getElementById('unassignedWarnText').textContent =
      `${unassignedCount} item${unassignedCount > 1 ? 's are' : ' is'} not assigned to anyone.`;
  } else {
    warn.classList.add('hidden');
  }

  // Render cards
  grid.innerHTML = state.people.map(p => {
    const s = shares[p.id];
    const itemRows = s.items.map(i =>
      `<div class="split-item"><span>${i.name}</span><span>${fmt(i.share)}</span></div>`
    ).join('');
    let extraRows = '';
    if (r.service_charge_amt > 0) {
      const sc = Math.round(r.service_charge_amt * (s.subtotal / totalItems));
      extraRows += `<div class="split-sub"><span>Service</span><span>${fmt(sc)}</span></div>`;
    }
    if (r.tax_amt > 0) {
      const tx = Math.round(r.tax_amt * (s.subtotal / totalItems));
      extraRows += `<div class="split-sub"><span>${r.tax_label || 'Tax'}</span><span>${fmt(tx)}</span></div>`;
    }
    return `
      <div class="split-card" style="border-top-color:${p.color.bg}">
        <div class="split-card-name">
          <div class="assignee-dot" style="background:${p.color.bg};width:22px;height:22px;font-size:9px;border:none">${initials(p.name)}</div>
          ${p.name}
        </div>
        ${itemRows || '<div class="split-item" style="color:var(--text3)"><span>No items assigned</span></div>'}
        ${s.subtotal > 0 && extras > 0 ? `<hr class="split-divider">${extraRows}` : ''}
        <div class="split-total">
          <span>Total</span>
          <span>${fmt(s.total)}</span>
        </div>
      </div>`;
  }).join('');
}

// ─── Utils ────────────────────────────────────────────────
function fmt(n) {
  return (n || 0).toLocaleString('id-ID');
}
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function resetApp() {
  state = { images: [], receipt: null, people: [], assignments: {} };
  hide('stepPreview'); hide('stepAssign');
  show('stepUpload');
  document.getElementById('fileInput').value = '';
}
</script>
